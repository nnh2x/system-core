version: '3.9'

services:
  # ─── Backend (NestJS) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    image: huy9983123203/system-core-backend:latest
    container_name: system-core-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app           # hot-reload source mount
      - /app/node_modules        # preserve container node_modules

  # ─── Frontend (React / Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: development
    image: huy9983123203/system-core-frontend:latest
    container_name: system-core-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3001:3001'
    volumes:
      - ./frontend:/app          # hot-reload source mount
      - /app/node_modules        # preserve container node_modules
    depends_on:
      - backend
