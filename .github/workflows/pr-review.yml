name: PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}-${{ github.event_name == 'pull_request_review_comment' && 'pr_comment' || 'pr' }}
  cancel-in-progress: ${{ github.event_name != 'pull_request_review_comment' }}

# ─── Stage 1: Static checks (chạy song song, nhanh) ──────────────────────────
#   └─ dependency-scan
#   └─ backend-lint
#   └─ frontend-lint
# ─── Stage 2: AI review (chỉ chạy sau khi stage 1 pass, tránh tốn token) ─────
#   └─ ai-review

jobs:
  # ─── 1a. Dependency vulnerability scan ──────────────────────────────────────
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
          fail-on-severity: moderate

  # ─── 1b. Backend — lint + typecheck ─────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ─── 1c. Frontend — lint + typecheck ────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  # ─── 2. AI review (chạy sau khi tất cả static checks pass) ──────────────────
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: [dependency-scan, backend-lint, frontend-lint]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Code Review
        uses: coderabbitai/openai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          debug: false
          review_simple_changes: false
          review_comment_lgtm: false
          openai_base_url: https://openrouter.ai/api/v1
          openai_light_model: mistralai/mistral-7b-instruct
          openai_heavy_model: mistralai/mistral-7b-instruct
          openai_timeout_ms: 900000
          language: vi
          system_message: |
            Bạn là một senior software engineer đang review code cho một NestJS + React project.
            Hãy tập trung vào:
            - Lỗi logic và bug tiềm ẩn
            - Vấn đề bảo mật (SQL injection, XSS, lộ credentials, ...)
            - Performance
            - Code style và best practices (NestJS, TypeScript, React)
            - Thiếu error handling
            Trả lời bằng tiếng Việt. Ngắn gọn, rõ ràng.
